<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Aria Dawn — Premium (Light)</title>
<style>@import url('https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&family=DM+Sans:opsz,wght@9..40,400;9..40,500&display=swap');</style>
<style>
  :root{
    --base:#F7F5F2;--glass-fill:rgba(255,255,255,0.78);--glass-stroke:rgba(0,0,0,0.07);--glass-stroke-bright:rgba(0,0,0,0.12);
    --shadow:0 4px 20px rgba(0,0,0,0.07),0 1px 4px rgba(0,0,0,0.04);
    --text-primary:#1C1A2E;--text-secondary:#6B6880;--text-tertiary:#A8A5C0;
    --aurora-violet:#5B3FE8;--aurora-teal:#0BABA0;--aurora-magenta:#A02FCC;--aurora-amber:#D97706;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--base);font-family:'DM Sans',ui-sans-serif,system-ui,sans-serif;display:flex;justify-content:center;padding:40px;}
  body::before{content:'';position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse 80% 60% at 15% 20%,rgba(91,63,232,.08) 0%,transparent 55%),radial-gradient(ellipse 60% 50% at 80% 80%,rgba(11,171,160,.06) 0%,transparent 55%);pointer-events:none;}
  .phone{position:relative;z-index:2;width:390px;height:844px;border-radius:44px;overflow:hidden;border:1px solid rgba(0,0,0,.08);box-shadow:0 40px 120px rgba(0,0,0,.12),inset 0 1px 0 rgba(255,255,255,.9);background:rgba(247,245,242,.97);display:flex;flex-direction:column;}
  .status-bar{display:flex;justify-content:space-between;padding:14px 24px 0;font-family:'Sora',system-ui,sans-serif;font-size:15px;font-weight:600;color:var(--text-primary);flex-shrink:0;}
  .nav-bar{display:flex;align-items:center;padding:12px 16px;flex-shrink:0;}
  .back-btn{width:36px;height:36px;border-radius:50%;background:var(--glass-fill);border:1px solid var(--glass-stroke);box-shadow:var(--shadow);display:flex;align-items:center;justify-content:center;}
  .back-btn svg{width:18px;height:18px;fill:var(--text-primary);}
  .nav-title{font-family:'Sora',system-ui,sans-serif;font-size:17px;font-weight:600;margin-left:12px;color:var(--text-primary);}
  .content{flex:1;overflow-y:auto;padding:0 0 32px;}
  .content::-webkit-scrollbar{display:none;}

  /* HERO */
  .hero{
    height:180px;position:relative;overflow:hidden;flex-shrink:0;
    background:linear-gradient(180deg,#F7F5F2,#F7F5F2);
    display:flex;align-items:center;justify-content:center;flex-direction:column;gap:8px;
  }
  .hero::before{
    content:'';position:absolute;inset:0;
    background:
      radial-gradient(ellipse 120% 90% at 50% 0%,rgba(160,47,204,.25) 0%,transparent 50%),
      radial-gradient(ellipse 80% 70% at 10% 60%,rgba(91,63,232,.2) 0%,transparent 55%),
      radial-gradient(ellipse 80% 70% at 90% 60%,rgba(11,171,160,.18) 0%,transparent 55%);
  }
  .hero::after{content:'';position:absolute;bottom:0;left:0;right:0;height:60px;background:linear-gradient(transparent,rgba(247,245,242,.97));}
  .hero-title{font-family:'Sora',system-ui,sans-serif;font-size:28px;font-weight:700;position:relative;z-index:1;letter-spacing:-.02em;color:var(--text-primary);}
  .hero-sub{font-size:13px;color:var(--text-secondary);position:relative;z-index:1;}

  /* FEATURE TABLE */
  .table-wrap{padding:0 20px;}
  .table-header{display:flex;padding:10px 0;border-bottom:1px solid rgba(0,0,0,.06);margin-bottom:4px;}
  .col-feature{flex:1;font-family:'Sora',system-ui,sans-serif;font-size:11px;font-weight:500;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:.08em;}
  .col-tier{width:52px;text-align:center;font-family:'Sora',system-ui,sans-serif;font-size:11px;font-weight:500;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:.06em;}
  .col-tier.premium-col{color:var(--aurora-violet);}
  .feature-row{display:flex;align-items:center;padding:9px 0;border-bottom:1px solid rgba(0,0,0,.04);}
  .feature-row:last-child{border-bottom:none;}
  .feature-name{flex:1;font-size:13px;color:var(--text-primary);}
  .check{width:52px;display:flex;justify-content:center;}
  .check svg{width:16px;height:16px;}
  .check.yes svg{fill:var(--aurora-teal);}
  .check.no svg{fill:rgba(0,0,0,.15);}
  .check.premium-yes svg{fill:var(--aurora-violet);}

  /* PRICING */
  .pricing-section{padding:20px;}
  .pricing-row{display:flex;gap:12px;}
  .pricing-card{flex:1;padding:20px 16px;text-align:center;background:var(--glass-fill);border:1px solid var(--glass-stroke);border-radius:20px;box-shadow:var(--shadow);}
  .pricing-card.featured{background:rgba(91,63,232,.05);border-color:transparent;position:relative;}
  .pricing-card.featured::before{content:'';position:absolute;inset:-1px;border-radius:21px;z-index:-1;background:linear-gradient(135deg,var(--aurora-violet),var(--aurora-teal));}
  .pricing-badge{display:inline-block;padding:3px 10px;border-radius:999px;font-size:10px;font-weight:600;background:linear-gradient(135deg,var(--aurora-violet),var(--aurora-magenta));color:#fff;margin-bottom:8px;}
  .pricing-name{font-family:'Sora',system-ui,sans-serif;font-size:13px;font-weight:500;color:var(--text-secondary);margin-bottom:6px;}
  .pricing-price{font-family:'Sora',system-ui,sans-serif;font-size:32px;font-weight:700;color:var(--text-primary);}
  .pricing-period{font-size:12px;color:var(--text-secondary);}
  .btn-subscribe{width:100%;margin-top:14px;padding:11px;border-radius:999px;border:none;cursor:pointer;background:linear-gradient(135deg,var(--aurora-violet),var(--aurora-magenta));color:#fff;font-family:'Sora',system-ui,sans-serif;font-size:13px;font-weight:600;box-shadow:0 4px 16px rgba(91,63,232,.3);}
  .restore-btn{width:calc(100% - 40px);margin:12px 20px 0;padding:12px;border:none;background:transparent;color:var(--text-secondary);font-family:'DM Sans',system-ui,sans-serif;font-size:13px;cursor:pointer;}
</style>
</head>
<body>
<div class="phone">
  <div class="status-bar"><span>9:41</span></div>
  <div class="nav-bar">
    <div class="back-btn"><svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg></div>
    <div class="nav-title">Premium</div>
  </div>
  <div class="hero">
    <div class="hero-title">Aria Premium</div>
    <div class="hero-sub">Unlock the full Aria experience</div>
  </div>
  <div class="content">
    <div class="table-wrap">
      <div class="table-header">
        <div class="col-feature">Feature</div>
        <div class="col-tier">Free</div>
        <div class="col-tier premium-col">Pro</div>
      </div>
      <div class="feature-row"><div class="feature-name">General Q&A</div><div class="check yes"><svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg></div><div class="check premium-yes"><svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg></div></div>
      <div class="feature-row"><div class="feature-name">Wake Word</div><div class="check yes"><svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg></div><div class="check premium-yes"><svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg></div></div>
      <div class="feature-row"><div class="feature-name">Web Search</div><div class="check yes"><svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg></div><div class="check premium-yes"><svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg></div></div>
      <div class="feature-row"><div class="feature-name" style="color:var(--aurora-violet)">5 Premium Voices</div><div class="check no"><svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg></div><div class="check premium-yes"><svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg></div></div>
      <div class="feature-row"><div class="feature-name" style="color:var(--aurora-violet)">Phone Calls</div><div class="check no"><svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg></div><div class="check premium-yes"><svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg></div></div>
      <div class="feature-row"><div class="feature-name" style="color:var(--aurora-violet)">Screen Control</div><div class="check no"><svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg></div><div class="check premium-yes"><svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg></div></div>
      <div class="feature-row"><div class="feature-name" style="color:var(--aurora-violet)">Send SMS</div><div class="check no"><svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg></div><div class="check premium-yes"><svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg></div></div>
    </div>
    <div class="pricing-section">
      <div class="pricing-row">
        <div class="pricing-card">
          <div class="pricing-name">Monthly</div>
          <div class="pricing-price">$2.99</div>
          <div class="pricing-period">/month</div>
          <button class="btn-subscribe" style="background:var(--glass-fill);border:1px solid var(--glass-stroke-bright);box-shadow:none;color:var(--text-primary);">Subscribe</button>
        </div>
        <div class="pricing-card featured">
          <div class="pricing-badge">Save 44%</div>
          <div class="pricing-name">Yearly</div>
          <div class="pricing-price">$19.99</div>
          <div class="pricing-period">/year</div>
          <button class="btn-subscribe">Subscribe</button>
        </div>
      </div>
    </div>
    <button class="restore-btn">Restore Purchases</button>
  </div>
</div>
</body>
</html>
