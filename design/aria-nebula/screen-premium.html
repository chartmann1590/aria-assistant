<!-- @dsCard group="Screens" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Aria Nebula — Premium Screen</title>
<style>@import url('https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&family=DM+Sans:opsz,wght@9..40,400;9..40,500&display=swap');</style>
<style>
  :root{
    --base:#06060B;--glass-fill:rgba(255,255,255,0.04);--glass-stroke:rgba(255,255,255,0.08);
    --glass-stroke-bright:rgba(255,255,255,0.13);
    --text-primary:#F0EFFE;--text-secondary:#9896B8;--text-tertiary:#5E5C80;
    --aurora-violet:#7C5CFF;--aurora-teal:#22D3C5;--aurora-magenta:#C04AE0;--aurora-amber:#F59E0B;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--base);font-family:'DM Sans',sans-serif;display:flex;justify-content:center;gap:32px;padding:40px;flex-wrap:wrap;}
  body::before{content:'';position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse 80% 60% at 15% 20%,rgba(124,92,255,.18) 0%,transparent 60%),radial-gradient(ellipse 60% 50% at 80% 15%,rgba(192,74,224,.14) 0%,transparent 55%),radial-gradient(ellipse 70% 60% at 70% 85%,rgba(34,211,197,.12) 0%,transparent 60%);pointer-events:none;}
  .phone{position:relative;z-index:2;width:390px;height:844px;border-radius:44px;overflow:hidden;border:1.5px solid rgba(255,255,255,.1);box-shadow:0 40px 120px rgba(0,0,0,.7),inset 0 1px 0 rgba(255,255,255,.07);background:rgba(6,6,11,.97);display:flex;flex-direction:column;}
  .status-bar{display:flex;justify-content:space-between;align-items:center;padding:14px 24px 0;font-family:'Sora',sans-serif;font-size:15px;font-weight:600;flex-shrink:0;}
  .nav-bar{display:flex;align-items:center;padding:12px 16px;flex-shrink:0;}
  .back-btn{width:36px;height:36px;border-radius:50%;background:var(--glass-fill);border:1px solid var(--glass-stroke);display:flex;align-items:center;justify-content:center;cursor:pointer;}
  .back-btn svg{width:18px;height:18px;fill:var(--text-primary);}
  .nav-title{font-family:'Sora',sans-serif;font-size:17px;font-weight:600;margin-left:12px;}
  .content{flex:1;overflow-y:auto;padding:0 0 32px;}
  .content::-webkit-scrollbar{display:none;}

  /* AURORA HERO */
  .hero{
    height:200px;position:relative;overflow:hidden;flex-shrink:0;
    background:linear-gradient(180deg,var(--base),var(--base));
    display:flex;align-items:center;justify-content:center;flex-direction:column;gap:8px;
  }
  .hero::before{
    content:'';position:absolute;inset:0;
    background:
      radial-gradient(ellipse 120% 80% at 50% 0%,rgba(192,74,224,.5) 0%,transparent 50%),
      radial-gradient(ellipse 80% 60% at 10% 50%,rgba(124,92,255,.4) 0%,transparent 55%),
      radial-gradient(ellipse 80% 60% at 90% 50%,rgba(34,211,197,.3) 0%,transparent 55%);
  }
  .hero-title{font-family:'Sora',sans-serif;font-size:28px;font-weight:700;position:relative;z-index:1;letter-spacing:-.02em;}
  .hero-sub{font-size:13px;color:rgba(255,255,255,.6);position:relative;z-index:1;}
  /* Hairline bottom fade */
  .hero::after{content:'';position:absolute;bottom:0;left:0;right:0;height:80px;background:linear-gradient(transparent,rgba(6,6,11,.97));}

  /* FEATURE TABLE */
  .table-wrap{padding:0 20px;}
  .table-header{display:flex;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.07);margin-bottom:4px;}
  .col-feature{flex:1;font-family:'Sora',sans-serif;font-size:11px;font-weight:500;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:.08em;}
  .col-tier{width:52px;text-align:center;font-family:'Sora',sans-serif;font-size:11px;font-weight:500;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:.06em;}
  .col-tier.premium-col{color:var(--aurora-violet);}

  .feature-row{display:flex;align-items:center;padding:9px 0;border-bottom:1px solid rgba(255,255,255,.04);}
  .feature-row:last-child{border-bottom:none;}
  .feature-name{flex:1;font-size:13px;color:var(--text-primary);}
  .check{width:52px;display:flex;justify-content:center;}
  .check svg{width:16px;height:16px;}
  .check.yes svg{fill:#22D3C5;}
  .check.no svg{fill:rgba(255,255,255,.18);}
  .check.premium-yes svg{fill:var(--aurora-violet);}

  /* PRICING */
  .pricing-section{padding:20px;}
  .pricing-row{display:flex;gap:12px;}
  .pricing-card{
    flex:1;padding:20px 16px;text-align:center;
    background:var(--glass-fill);border:1px solid var(--glass-stroke);border-radius:20px;
  }
  .pricing-card.featured{
    background:rgba(124,92,255,.08);
    border-color:transparent;
    background-clip:padding-box;
    position:relative;
  }
  .pricing-card.featured::before{
    content:'';position:absolute;inset:-1px;border-radius:21px;z-index:-1;
    background:linear-gradient(135deg,var(--aurora-violet),var(--aurora-teal));
  }
  .pricing-badge{display:inline-block;padding:3px 10px;border-radius:999px;font-size:10px;font-weight:600;background:linear-gradient(135deg,var(--aurora-violet),var(--aurora-magenta));color:#fff;margin-bottom:8px;}
  .pricing-name{font-family:'Sora',sans-serif;font-size:13px;font-weight:500;color:var(--text-secondary);margin-bottom:6px;}
  .pricing-price{font-family:'Sora',sans-serif;font-size:32px;font-weight:700;}
  .pricing-period{font-size:12px;color:var(--text-secondary);}
  .btn-subscribe{
    width:100%;margin-top:14px;padding:11px;border-radius:999px;border:none;cursor:pointer;
    background:linear-gradient(135deg,var(--aurora-violet),var(--aurora-magenta));
    color:#fff;font-family:'Sora',sans-serif;font-size:13px;font-weight:600;
    box-shadow:0 0 16px rgba(124,92,255,.4);
  }
  .restore-btn{
    width:100%;padding:12px;margin:12px 20px 0;width:calc(100% - 40px);
    border:none;background:transparent;color:var(--text-secondary);
    font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;
  }
</style>
</head>
<body>
<div class="phone">
  <div class="status-bar"><span>9:41</span></div>
  <div class="nav-bar">
    <div class="back-btn"><svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg></div>
    <div class="nav-title">Premium</div>
  </div>

  <!-- HERO -->
  <div class="hero">
    <div class="hero-title">Aria Premium</div>
    <div class="hero-sub">Unlock the full Aria experience</div>
  </div>

  <div class="content">
    <!-- FEATURE TABLE -->
    <div class="table-wrap">
      <div class="table-header">
        <div class="col-feature">Feature</div>
        <div class="col-tier">Free</div>
        <div class="col-tier premium-col">Pro</div>
      </div>
      <div class="feature-row"><div class="feature-name">General Q&A</div><div class="check yes"><svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg></div><div class="check premium-yes"><svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg></div></div>
      <div class="feature-row"><div class="feature-name">Wake Word</div><div class="check yes"><svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg></div><div class="check premium-yes"><svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg></div></div>
      <div class="feature-row"><div class="feature-name">Web Search</div><div class="check yes"><svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg></div><div class="check premium-yes"><svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg></div></div>
      <div class="feature-row"><div class="feature-name" style="color:var(--aurora-violet)">5 Premium Voices</div><div class="check no"><svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg></div><div class="check premium-yes"><svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg></div></div>
      <div class="feature-row"><div class="feature-name" style="color:var(--aurora-violet)">Phone Calls</div><div class="check no"><svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg></div><div class="check premium-yes"><svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg></div></div>
      <div class="feature-row"><div class="feature-name" style="color:var(--aurora-violet)">Send SMS</div><div class="check no"><svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg></div><div class="check premium-yes"><svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg></div></div>
      <div class="feature-row"><div class="feature-name" style="color:var(--aurora-violet)">Screen Control</div><div class="check no"><svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg></div><div class="check premium-yes"><svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg></div></div>
      <div class="feature-row"><div class="feature-name" style="color:var(--aurora-violet)">Camera Control</div><div class="check no"><svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg></div><div class="check premium-yes"><svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg></div></div>
    </div>

    <!-- PRICING -->
    <div class="pricing-section">
      <div class="pricing-row">
        <div class="pricing-card">
          <div class="pricing-name">Monthly</div>
          <div class="pricing-price">$2.99</div>
          <div class="pricing-period">/month</div>
          <button class="btn-subscribe" style="background:var(--glass-fill);border:1px solid var(--glass-stroke-bright);box-shadow:none;color:var(--text-primary);">Subscribe</button>
        </div>
        <div class="pricing-card featured">
          <div class="pricing-badge">Save 44%</div>
          <div class="pricing-name">Yearly</div>
          <div class="pricing-price">$19.99</div>
          <div class="pricing-period">/year</div>
          <button class="btn-subscribe">Subscribe</button>
        </div>
      </div>
    </div>

    <button class="restore-btn">Restore Purchases</button>
  </div>
</div>
</body>
</html>
