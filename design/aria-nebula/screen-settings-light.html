<!-- @dsCard group="Screens · Light" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Aria Dawn — Settings (Light)</title>
<style>@import url('https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&family=DM+Sans:opsz,wght@9..40,400;9..40,500&display=swap');</style>
<style>
  :root{
    --base:#F7F5F2;--glass-fill:rgba(255,255,255,0.75);--glass-stroke:rgba(0,0,0,0.07);
    --glass-stroke-bright:rgba(0,0,0,0.12);--shadow:0 4px 20px rgba(0,0,0,0.07),0 1px 4px rgba(0,0,0,0.04);
    --text-primary:#1C1A2E;--text-secondary:#6B6880;--text-tertiary:#A8A5C0;
    --aurora-violet:#5B3FE8;--aurora-teal:#0BABA0;--aurora-magenta:#A02FCC;--aurora-amber:#D97706;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--base);font-family:'DM Sans',ui-sans-serif,system-ui,sans-serif;display:flex;justify-content:center;padding:40px;}
  body::before{content:'';position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse 80% 60% at 15% 20%,rgba(91,63,232,.08) 0%,transparent 55%),radial-gradient(ellipse 60% 50% at 80% 80%,rgba(11,171,160,.06) 0%,transparent 55%);pointer-events:none;}
  .phone{position:relative;z-index:2;width:390px;height:844px;border-radius:44px;overflow:hidden;border:1px solid rgba(0,0,0,0.08);box-shadow:0 40px 120px rgba(0,0,0,0.12),inset 0 1px 0 rgba(255,255,255,.9);background:rgba(247,245,242,.97);display:flex;flex-direction:column;}
  .status-bar{display:flex;justify-content:space-between;padding:14px 24px 0;font-family:'Sora',system-ui,sans-serif;font-size:15px;font-weight:600;color:var(--text-primary);flex-shrink:0;}
  .nav-bar{display:flex;align-items:center;padding:12px 16px;flex-shrink:0;border-bottom:1px solid rgba(0,0,0,.05);}
  .back-btn{width:36px;height:36px;border-radius:50%;background:var(--glass-fill);border:1px solid var(--glass-stroke);box-shadow:var(--shadow);display:flex;align-items:center;justify-content:center;}
  .back-btn svg{width:18px;height:18px;fill:var(--text-primary);}
  .nav-title{font-family:'Sora',system-ui,sans-serif;font-size:17px;font-weight:600;margin-left:12px;color:var(--text-primary);}
  .content{flex:1;overflow-y:auto;padding:20px 20px 32px;}
  .content::-webkit-scrollbar{display:none;}
  .section{margin-bottom:20px;}
  .section-header{font-family:'Sora',system-ui,sans-serif;font-size:11px;font-weight:500;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:.1em;padding:0 4px;margin-bottom:8px;}
  .card{background:var(--glass-fill);border:1px solid var(--glass-stroke);border-radius:20px;overflow:hidden;box-shadow:var(--shadow);}
  .row{display:flex;align-items:center;padding:14px 16px;border-bottom:1px solid rgba(0,0,0,0.04);gap:12px;}
  .row:last-child{border-bottom:none;}
  .row-icon{width:32px;height:32px;border-radius:9px;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
  .row-icon svg{width:16px;height:16px;}
  .row-icon.violet{background:rgba(91,63,232,.12);} .row-icon.violet svg{fill:var(--aurora-violet);}
  .row-icon.teal{background:rgba(11,171,160,.1);} .row-icon.teal svg{fill:var(--aurora-teal);}
  .row-icon.amber{background:rgba(217,119,6,.1);} .row-icon.amber svg{fill:var(--aurora-amber);}
  .row-label{flex:1;}
  .row-label-text{font-size:14px;color:var(--text-primary);}
  .row-label-sub{font-size:12px;color:var(--text-secondary);margin-top:1px;}
  .toggle{width:44px;height:26px;background:rgba(0,0,0,.1);border:1px solid rgba(0,0,0,.08);border-radius:13px;position:relative;flex-shrink:0;cursor:pointer;}
  .toggle.on{background:linear-gradient(90deg,var(--aurora-violet),var(--aurora-teal));border-color:transparent;}
  .toggle::after{content:'';position:absolute;width:20px;height:20px;background:#fff;border-radius:50%;top:2px;left:2px;transition:left .2s;box-shadow:0 1px 4px rgba(0,0,0,.25);}
  .toggle.on::after{left:20px;}
  .slider-row{flex-direction:column;align-items:stretch;gap:8px;}
  .slider-top{display:flex;justify-content:space-between;font-size:14px;}
  .slider-value{color:var(--aurora-violet);font-weight:500;font-size:13px;}
  input[type=range]{-webkit-appearance:none;width:100%;height:4px;border-radius:2px;background:linear-gradient(90deg,var(--aurora-violet) 55%,rgba(0,0,0,.1) 55%);outline:none;}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;background:linear-gradient(135deg,var(--aurora-violet),var(--aurora-magenta));box-shadow:0 2px 8px rgba(91,63,232,.4);cursor:pointer;}
  .voice-row{display:flex;align-items:center;padding:12px 14px;border-bottom:1px solid rgba(0,0,0,0.04);gap:10px;}
  .voice-row:last-child{border-bottom:none;}
  .voice-avatar{width:36px;height:36px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:'Sora',system-ui,sans-serif;font-size:13px;font-weight:600;color:#fff;}
  .voice-name{font-size:13px;font-weight:500;flex:1;color:var(--text-primary);}
  .tag{font-size:10px;padding:2px 7px;border-radius:999px;}
  .tag-default{background:rgba(11,171,160,.1);color:var(--aurora-teal);border:1px solid rgba(11,171,160,.2);}
  .tag-premium{background:rgba(217,119,6,.1);color:var(--aurora-amber);border:1px solid rgba(217,119,6,.2);}
  .btn-xs{padding:5px 12px;border-radius:999px;font-size:11px;font-family:'Sora',system-ui,sans-serif;font-weight:500;cursor:pointer;}
  .btn-selected{background:rgba(11,171,160,.1);border:1px solid rgba(11,171,160,.25);color:var(--aurora-teal);}
  .btn-select{background:linear-gradient(135deg,var(--aurora-violet),var(--aurora-magenta));border:none;color:#fff;}
  .btn-preview{background:transparent;border:1px solid var(--glass-stroke-bright);color:var(--text-secondary);}
  .btn-perm{width:100%;padding:14px;border-radius:999px;border:1px solid var(--glass-stroke-bright);background:var(--glass-fill);box-shadow:var(--shadow);color:var(--text-primary);font-family:'Sora',system-ui,sans-serif;font-size:14px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;}
  .btn-perm svg{width:16px;height:16px;fill:var(--aurora-violet);}
</style>
</head>
<body>
<div class="phone">
  <div class="status-bar"><span>9:41</span></div>
  <div class="nav-bar">
    <div class="back-btn"><svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg></div>
    <div class="nav-title">Settings</div>
  </div>
  <div class="content">
    <div class="section">
      <div class="section-header">Voice Controls</div>
      <div class="card">
        <div class="row">
          <div class="row-icon violet"><svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1 1.93c-3.95-.49-7-3.85-7-7.93h2c0 3.31 2.69 6 6 6s6-2.69 6-6h2c0 4.08-3.05 7.44-7 7.93V19h3v2H9v-2h2v-3.07z"/></svg></div>
          <div class="row-label"><div class="row-label-text">Wake Word</div><div class="row-label-sub">Say "Hey Aria" to activate</div></div>
          <div class="toggle on"></div>
        </div>
        <div class="row slider-row">
          <div class="slider-top"><span class="row-label-text">Wake Sensitivity</span><span class="slider-value">0.7</span></div>
          <input type="range" min="0" max="100" value="70">
        </div>
        <div class="row slider-row">
          <div class="slider-top"><span class="row-label-text">TTS Speed</span><span class="slider-value">1.0×</span></div>
          <input type="range" min="0" max="100" value="40">
        </div>
        <div class="row slider-row">
          <div class="slider-top"><span class="row-label-text">TTS Pitch</span><span class="slider-value">1.0×</span></div>
          <input type="range" min="0" max="100" value="40">
        </div>
      </div>
    </div>
    <div class="section">
      <div class="section-header">Preferences</div>
      <div class="card">
        <div class="row">
          <div class="row-icon amber"><svg viewBox="0 0 24 24"><path d="M6.76 4.84l-1.8-1.79-1.41 1.41 1.79 1.79 1.42-1.41zM4 10.5H1v2h3v-2zm9-9.95h-2V3.5h2V.55zm7.45 3.91l-1.41-1.41-1.79 1.79 1.41 1.41 1.79-1.79zm-3.21 13.7l1.79 1.8 1.41-1.41-1.8-1.79-1.4 1.4zM20 10.5v2h3v-2h-3zm-8-5c-3.31 0-6 2.69-6 6s2.69 6 6 6 6-2.69 6-6-2.69-6-6-6zm-1 16.95h2V19.5h-2v2.95zm-7.45-3.91l1.41 1.41 1.79-1.8-1.41-1.41-1.79 1.8z"/></svg></div>
          <div class="row-label"><div class="row-label-text">Temperature Unit</div></div>
          <span style="font-size:13px;color:var(--text-secondary);margin-right:8px;">°F</span>
          <div class="toggle"></div>
        </div>
      </div>
    </div>
    <div class="section">
      <button class="btn-perm">
        <svg viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/></svg>
        Permissions & Access
      </button>
    </div>
    <div class="section">
      <div class="section-header">Voice Selection</div>
      <div class="card">
        <div class="voice-row"><div class="voice-avatar" style="background:linear-gradient(135deg,#5B3FE8,#0BABA0);">A</div><div style="flex:1"><div class="voice-name">Amy</div></div><span class="tag tag-default">Default</span><button class="btn-xs btn-preview">Preview</button><button class="btn-xs btn-selected">✓ On</button></div>
        <div class="voice-row"><div class="voice-avatar" style="background:linear-gradient(135deg,#0BABA0,#5B3FE8);">R</div><div style="flex:1"><div class="voice-name">Ryan</div></div><span class="tag tag-premium">Premium</span><button class="btn-xs btn-preview">Preview</button><button class="btn-xs btn-select">Select</button></div>
        <div class="voice-row"><div class="voice-avatar" style="background:linear-gradient(135deg,#A02FCC,#D97706);">E</div><div style="flex:1"><div class="voice-name">Emma</div></div><span class="tag tag-premium">Premium</span><button class="btn-xs btn-preview" style="opacity:.5">38%…</button></div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
