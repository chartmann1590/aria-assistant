name: Build

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build with Gradle
        run: |
          ./gradlew assembleDebug \
            -Pgithub.repo.owner=${{ secrets.GH_REPO_OWNER }} \
            -Pgithub.repo.name=${{ secrets.GH_REPO_NAME }} \
            -Padmob.app.id=${{ secrets.ADMOB_APP_ID }} \
            -Padmob.banner.id=${{ secrets.ADMOB_BANNER_AD_UNIT_ID }} \
            -Padmob.interstitial.id=${{ secrets.ADMOB_INTERSTITIAL_AD_UNIT_ID }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/
