name: Configure Google Play listing and subscriptions

on:
  workflow_dispatch:
    inputs:
      confirm_play_configuration:
        description: 'Type "configure" to update the listing and subscriptions'
        required: true
        type: string

permissions:
  contents: read

jobs:
  configure:
    runs-on: ubuntu-latest
    steps:
      - name: Require explicit configuration confirmation
        if: ${{ inputs.confirm_play_configuration != 'configure' }}
        run: exit 1

      - uses: actions/checkout@v4

      - name: Authenticate to Google Play
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          token_format: access_token
          access_token_scopes: https://www.googleapis.com/auth/androidpublisher

      - name: Configure products and store listing
        env:
          GOOGLE_OAUTH_ACCESS_TOKEN: ${{ steps.auth.outputs.access_token }}
          PLAY_PACKAGE_NAME: com.aria.assistant
        run: node scripts/configure-google-play.mjs
